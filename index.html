<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempo Metronome - Routine Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --panel-bg: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            
            --color-countdown: #f59e0b;
            --color-concentric: #ef4444;
            --color-eccentric: #06b6d4;
            --color-pause: #10b981;
            --color-rest: #8b5cf6;
            --color-idle: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }

        h1, h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
        }
        h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 20px;}
        h2 { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px;}

        .hidden { display: none !important; }

        /* GLOBAL COUNTDOWN HEADER */
        .global-countdown-box {
            background-color: rgba(15, 23, 42, 0.6);
            padding: 12px 15px;
            border-radius: 14px;
            border: 1px solid #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .global-countdown-box label { font-size: 0.9rem; }
        .global-countdown-box input { width: 80px; text-align: center; padding: 6px; }

        /* ROUTINE BUILDER */
        .setup-mode { display: flex; flex-direction: column; gap: 15px; }
        .exercise-card {
            background-color: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #334155;
            position: relative;
        }
        .remove-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 5;
        }
        .form-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-grid-4x1 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
        input, select {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        
        .action-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .add-ex-btn { background-color: #475569; }
        .start-workout-btn { background-color: var(--success); margin-top: 10px; padding: 16px; font-size: 1.05rem; }

        /* WORKOUT PLAYER */
        .dashboard {
            background-color: #0f172a;
            border-radius: 20px;
            padding: 25px 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        /* Struttura fluida e quadrata */
        .circle-box {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle-box svg {
            width: 100%;
            height: 100%;
        }
        .circle-bg { 
            fill: none; 
            stroke: #1e293b; 
            stroke-width: 8; 
        }
        .circle-progress {
            fill: none;
            stroke: var(--color-idle);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 376.9; /* 2 * PI * 60 */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }
        
        /* Stili del testo interno SVG */
        #timer-display {
            font-size: 3.5rem;
            font-weight: 900;
            fill: var(--text-main);
            text-anchor: middle;
            dominant-baseline: central;
        }
        
        #phase-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            fill: var(--text-muted);
            letter-spacing: 0.5px;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        
        .piston-box { display: flex; flex-direction: column; align-items: center; height: 140px; width: 60px; }
        .piston-track { width: 14px; height: 110px; background: #1e293b; border-radius: 6px; position: relative; border: 1px solid #334155; }
        .piston-weight { width: 32px; height: 16px; background: var(--color-idle); border-radius: 4px; position: absolute; left: -9px; bottom: 0%; transition: bottom 1s linear, background 0.3s ease; }
        
        .status-panel {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #334155;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .status-row { display: flex; justify-content: space-between; font-size: 0.95rem; }
        .status-row .label { color: var(--text-muted); font-weight: 600; }
        .status-row .val { font-weight: 700; }
        
        .player-controls { display: flex; flex-direction: column; gap: 12px; }
        .controls-row { display: flex; gap: 12px; width: 100%; }
        .controls-row button { flex: 1; }
        .btn-danger { background-color: #ef4444; }
        .btn-warning { background-color: var(--color-countdown); }
        .btn-failure { background-color: #f59e0b; color: #0f172a; font-weight: 800; padding: 16px; }

        .share-box {
            background: #0f172a;
            border: 1px dashed #475569;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 15px;
            cursor: pointer;
        }

        /* MEDIA QUERY RESPONSIVE COMPLETA PER SMARTPHONE */
        @media (max-width: 480px) {
            body {
                padding: 0;
                background-color: var(--bg-color);
            }
            .container {
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                padding: 20px 16px;
            }
            .mobile-split-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 10px;
            }
            .form-grid-4x1 {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .circle-box {
                width: 180px;
                height: 180px;
            }
            .circle-box svg {
                width: 170px;
                height: 170px;
                transform: rotate(-90deg) scale(1.13);
            }
            #timer-display {
                font-size: 3.8rem; /* Scaliamo solo il font in proporzione */
            }
            .dashboard { padding: 35px 15px; margin-bottom: 25px; }
            .action-btn { padding: 16px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-container" class="setup-mode">
        <h1>Routine Setup</h1>
        
        <div class="global-countdown-box">
            <label>⏱️ Initial Global Countdown (s)</label>
            <input type="number" id="global-init-countdown" value="10" min="2">
        </div>

        <div id="exercises-list"></div>
        <button class="action-btn add-ex-btn" onclick="addExerciseField()">+ Add Exercise</button>
        <button class="action-btn start-workout-btn" onclick="startWorkout()">Start Workout</button>
        <div class="share-box" onclick="copyConfigLink()">🔗 Click here to copy the shareable link of this routine</div>
    </div>

    <div id="player-container" class="hidden">
        <h1 id="current-ex-name">Exercise</h1>
        <h2 id="current-set-hub">SET 1/3</h2>

        <div class="dashboard">
            <div class="circle-box">
                <svg viewBox="0 0 150 150" width="100%" height="100%">
                    <circle class="circle-bg" cx="75" cy="75" r="60"></circle>
                    
                    <circle id="progress-ring" class="circle-progress" cx="75" cy="75" r="60" transform="rotate(-90 75 75)"></circle>
                    
                    <text id="timer-display" x="75" y="75" dominant-baseline="central" text-anchor="middle">--</text>
                    <text id="phase-title" x="75" y="112" text-anchor="middle">Ready</text>
                </svg>
            </div>
            <div class="piston-box">
                <div class="piston-track"><div id="piston-weight" class="piston-weight"></div></div>
                <div style="font-size:0.65rem; font-weight:700; margin-top:6px; color:var(--text-muted);">VECTOR</div>
            </div>
        </div>

        <div class="status-panel">
            <div class="status-row"><span class="label">Execution Mode:</span><span id="status-mode" class="val">--</span></div>
            <div class="status-row"><span class="label">Active Limb:</span><span id="status-limb" class="val">--</span></div>
            <div class="status-row"><span class="label">Reps Counter:</span><span id="status-reps" class="val">0</span></div>
        </div>

        <div class="player-controls">
            <button id="failureBtn" class="action-btn btn-failure hidden" onclick="triggerManualFailure()">🛑 Hit Failure! End Set</button>
            <div class="controls-row">
                <button id="playBtn" class="action-btn" onclick="toggleEngine()">Play</button>
                <button id="nextSetBtn" class="action-btn btn-warning hidden" onclick="manualNextSet()">Skip Rest</button>
                <button class="action-btn btn-danger" onclick="stopWorkout()">Edit Routine</button>
            </div>
        </div>
    </div>
</div>

<script>
    let routine = [];
    let currentExIdx = 0;
    let currentSetIdx = 0;
    let currentLimb = 'UNILATERAL_LEFT';
    let currentState = 'NOT_STARTED'; 
    
    let currentSecondsRemaining = 0;
    let phaseTotalSeconds = 0;
    let actualReps = 0;
    let initialCountdownSeconds = 10;
    
    let currentPhaseId = 0;
    let lastPhaseId = -1;

    let isRunning = false;
    let engineInterval = null;
    let audioCtx = null;

    const ring = document.getElementById('progress-ring');
    const ringCircumference = 2 * Math.PI * 60;
    ring.style.strokeDasharray = ringCircumference;

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        if (dataParam) {
            try {
                const parsed = JSON.parse(atob(decodeURIComponent(dataParam)));
                if (parsed.routine) {
                    routine = parsed.routine;
                    initialCountdownSeconds = parsed.globalCountdown || 10;
                } else {
                    routine = parsed; 
                }
                document.getElementById('global-init-countdown').value = initialCountdownSeconds;
                renderExercisesFromData();
            } catch (e) {
                console.error("Error decoding URL parameters, loading default.");
                addDefaultExercise();
            }
        } else {
            addDefaultExercise();
        }
    }

    function saveStateToURL() {
        buildRoutineFromDOM();
        if(routine.length === 0) return;
        const configObj = {
            globalCountdown: initialCountdownSeconds,
            routine: routine
        };
        const base64Str = btoa(JSON.stringify(configObj));
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?data=' + encodeURIComponent(base64Str);
        window.history.replaceState({path: newUrl}, '', newUrl);
    }

    function copyConfigLink() {
        saveStateToURL();
        navigator.clipboard.writeText(window.location.href);
        alert("Routine link copied to clipboard! Save it in your bookmarks.");
    }

    function addDefaultExercise() {
        routine = [{ name: "Bench Press", type: "bilateral", sets: 3, reps: 0, conc: 1, topP: 0, ecc: 2, botP: 0, limbRest: 0, setRest: 90 }];
        initialCountdownSeconds = 10;
        document.getElementById('global-init-countdown').value = initialCountdownSeconds;
        renderExercisesFromData();
    }

    function renderExercisesFromData() {
        const container = document.getElementById('exercises-list');
        container.innerHTML = '';
        routine.forEach((ex, idx) => {
            container.appendChild(createExerciseCard(ex, idx));
        });
    }

    function createExerciseCard(ex, idx) {
        const div = document.createElement('div');
        div.className = 'exercise-card';
        div.innerHTML = `
            <button class="remove-btn" onclick="removeExercise(${idx})">Delete</button>
            <div class="form-group">
                <label>Exercise Name</label>
                <input type="text" class="ex-name" value="${ex.name}" onchange="saveStateToURL()">
            </div>
            
            <div class="form-group">
                <label>Execution Type</label>
                <select class="ex-type" onchange="toggleLimbRestDOM(this); saveStateToURL();">
                    <option value="bilateral" ${ex.type === 'bilateral' ? 'selected' : ''}>Bilateral (Single Set)</option>
                    <option value="unilateral" ${ex.type === 'unilateral' ? 'selected' : ''}>Unilateral (One side)</option>
                </select>
            </div>

            <div class="mobile-split-row">
                <div class="form-group">
                    <label>Total Sets</label>
                    <input type="number" class="ex-sets" value="${ex.sets}" min="1" onchange="saveStateToURL()">
                </div>
                <div class="form-group">
                    <label>Target Reps (0=Fail)</label>
                    <input type="number" class="ex-reps" value="${ex.reps ?? 0}" min="0" onchange="saveStateToURL()">
                </div>
            </div>

            <div class="form-grid-4x1">
                <div class="form-group"><label>Conc (↑)</label><input type="number" class="ex-conc" value="${ex.conc}" min="0"></div>
                <div class="form-group"><label>Iso High</label><input type="number" class="ex-topP" value="${ex.topP}" min="0"></div>
                <div class="form-group"><label>Ecc (↓)</label><input type="number" class="ex-ecc" value="${ex.ecc}" min="0"></div>
                <div class="form-group"><label>Iso Low</label><input type="number" class="ex-botP" value="${ex.botP}" min="0"></div>
            </div>

            <div class="mobile-split-row">
                <div class="form-group">
                    <label>Post-Set Rest (s)</label>
                    <input type="number" class="ex-setRest" value="${ex.setRest}" min="0">
                </div>
                <div class="form-group class-limb-rest ${ex.type === 'bilateral' ? 'hidden' : ''}">
                    <label>Limb Rest (s)</label>
                    <input type="number" class="ex-limbRest" value="${ex.limbRest || 0}">
                </div>
            </div>
        `;
        return div;
    }

    function toggleLimbRestDOM(selectElem) {
        const card = selectElem.closest('.exercise-card');
        const limbRestGroup = card.querySelector('.class-limb-rest');
        if(selectElem.value === 'unilateral') limbRestGroup.classList.remove('hidden');
        else limbRestGroup.classList.add('hidden');
    }

    function addExerciseField() {
        buildRoutineFromDOM();
        routine.push({ name: "New Exercise", type: "bilateral", sets: 3, reps: 0, conc: 1, topP: 0, ecc: 2, botP: 0, limbRest: 0, setRest: 60 });
        renderExercisesFromData();
        saveStateToURL();
    }

    function removeExercise(idx) {
        buildRoutineFromDOM();
        routine.splice(idx, 1);
        renderExercisesFromData();
        saveStateToURL();
    }

    function buildRoutineFromDOM() {
        initialCountdownSeconds = parseInt(document.getElementById('global-init-countdown').value) || 10;
        const cards = document.querySelectorAll('.exercise-card');
        routine = Array.from(cards).map(card => ({
            name: card.querySelector('.ex-name').value,
            type: card.querySelector('.ex-type').value,
            sets: parseInt(card.querySelector('.ex-sets').value) || 1,
            reps: parseInt(card.querySelector('.ex-reps').value) === 0 ? 0 : (parseInt(card.querySelector('.ex-reps').value) || 0),
            conc: parseInt(card.querySelector('.ex-conc').value) || 0,
            topP: parseInt(card.querySelector('.ex-topP').value) || 0,
            ecc: parseInt(card.querySelector('.ex-ecc').value) || 0,
            botP: parseInt(card.querySelector('.ex-botP').value) || 0,
            limbRest: parseInt(card.querySelector('.ex-limbRest')?.value) || 0,
            setRest: parseInt(card.querySelector('.ex-setRest').value) || 0
        }));
    }

    function startWorkout() {
        buildRoutineFromDOM();
        if(routine.length === 0) return alert("Add at least one exercise!");
        
        document.getElementById('setup-container').classList.add('hidden');
        document.getElementById('player-container').classList.remove('hidden');
        
        currentExIdx = 0;
        currentSetIdx = 0;
        
        const ex = routine[currentExIdx];
        currentLimb = (ex.type === 'unilateral') ? 'UNILATERAL_LEFT' : 'BILATERAL';
        
        // Inizializza il Countdown Unico Globale
        currentState = 'COUNTDOWN';
        phaseTotalSeconds = initialCountdownSeconds;
        currentSecondsRemaining = phaseTotalSeconds;
        actualReps = 0;
        currentPhaseId++;
        
        lastPhaseId = currentPhaseId - 1; 
        updatePlayerUI(true);
    }

    function stopWorkout() {
        clearInterval(engineInterval);
        isRunning = false;
        document.getElementById('playBtn').innerText = 'Play';
        document.getElementById('playBtn').classList.remove('hidden');
        document.getElementById('nextSetBtn').classList.add('hidden');
        document.getElementById('failureBtn').classList.add('hidden');
        document.getElementById('player-container').classList.add('hidden');
        document.getElementById('setup-container').classList.remove('hidden');
    }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function shouldPlayRestTick(sec) {
        if (sec <= 10 && sec >= 0) return true;
        if (sec === 15) return true;
        if (sec <= 120 && sec >= 30) {
            return (sec % 30 === 0);
        }
        if (sec > 120) {
            return (sec % 60 === 0);
        }
        return false;
    }

    function playTick(state) {
        initAudio();
        
        if (state === 'LIMB_REST' || state === 'SET_REST') {
            if (!shouldPlayRestTick(currentSecondsRemaining)) return;
        }

        let freq = 440;
        if (state === 'CONCENTRIC') freq = 850;
        if (state === 'ECCENTRIC') freq = 300;
        if (state === 'TOP_PAUSE' || state === 'BOTTOM_PAUSE') freq = 180;
        if (state === 'LIMB_REST' || state === 'SET_REST') freq = 520; 

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.07);
    }

    function toggleEngine() {
        initAudio();
        const btn = document.getElementById('playBtn');
        if (isRunning) {
            clearInterval(engineInterval);
            isRunning = false;
            btn.innerText = 'Play';
            updatePlayerUI(false); 
        } else {
            isRunning = true;
            btn.innerText = 'Stop';
            tick();
            engineInterval = setInterval(tick, 1000);
        }
    }

    function tick() {
        if (currentSecondsRemaining <= 0) {
            advanceStateLogic();
        }

        let phaseChanged = (currentPhaseId !== lastPhaseId);
        lastPhaseId = currentPhaseId;

        playTick(currentState);
        updatePlayerUI(phaseChanged);
        currentSecondsRemaining--;
    }

    function advanceStateLogic() {
        const ex = routine[currentExIdx];

        if (currentState === 'COUNTDOWN') { goToPhase('CONCENTRIC', ex.conc); return; }
        if (currentState === 'CONCENTRIC') { goToPhase(ex.topP > 0 ? 'TOP_PAUSE' : 'ECCENTRIC', ex.topP > 0 ? ex.topP : ex.ecc); return; }
        if (currentState === 'TOP_PAUSE') { goToPhase('ECCENTRIC', ex.ecc); return; }
        if (currentState === 'ECCENTRIC') {
            goToPhase(ex.botP > 0 ? 'BOTTOM_PAUSE' : 'END_REP_CHECK', ex.botP > 0 ? ex.botP : 0);
            if (ex.botP === 0) handleEndRep();
            return;
        }
        if (currentState === 'BOTTOM_PAUSE') { handleEndRep(); return; }
        
        // Quando finisce il riposo del set o dell'arto, si riparte DIRETTAMENTE senza tasti intermedi
        if (currentState === 'SET_REST' || currentState === 'LIMB_REST') {
            goToPhase('CONCENTRIC', ex.conc);
            return;
        }

        function handleEndRep() {
            actualReps++;
            if (ex.reps > 0 && actualReps >= ex.reps) {
                closeActiveLimbOrSet();
            } else {
                goToPhase('CONCENTRIC', ex.conc);
            }
        }
    }

    function triggerManualFailure() {
        if(!isRunning || currentState === 'SET_REST' || currentState === 'LIMB_REST' || currentState === 'COUNTDOWN') return;
        closeActiveLimbOrSet();
        let phaseChanged = (currentPhaseId !== lastPhaseId);
        lastPhaseId = currentPhaseId;
        updatePlayerUI(phaseChanged);
    }

    function closeActiveLimbOrSet() {
        const ex = routine[currentExIdx];
        if (currentLimb === 'UNILATERAL_LEFT') {
            currentLimb = 'UNILATERAL_RIGHT';
            actualReps = 0;
            if (ex.limbRest > 0) {
                goToPhase('LIMB_REST', ex.limbRest);
            } else {
                goToPhase('CONCENTRIC', ex.conc); // Nessun rest arto? Parte subito il destro
            }
        } else {
            currentSetIdx++;
            if (currentSetIdx < ex.sets) {
                if (ex.setRest > 0) goToPhase('SET_REST', ex.setRest);
                else startNextSetDirectly();
            } else {
                // Esercizio concluso. Passaggio a quello successivo
                currentExIdx++;
                if (currentExIdx < routine.length) {
                    currentSetIdx = 0;
                    const nextEx = routine[currentExIdx];
                    currentLimb = (nextEx.type === 'unilateral') ? 'UNILATERAL_LEFT' : 'BILATERAL';
                    actualReps = 0;
                    
                    if (ex.setRest > 0) {
                        goToPhase('SET_REST', ex.setRest); // Sfrutta il rest dell'ultimo set per preparare il nuovo esercizio
                    } else {
                        startNextSetDirectly();
                    }
                } else {
                    clearInterval(engineInterval);
                    isRunning = false;
                    alert("🏆 CONGRATULATIONS! You have completed your workout session.");
                    stopWorkout();
                }
            }
        }
    }

    function goToPhase(nextState, duration) {
        if (nextState === 'END_REP_CHECK') return; 

        currentState = nextState;
        phaseTotalSeconds = duration;
        currentSecondsRemaining = phaseTotalSeconds;
        currentPhaseId++; 

        // Gestione dei tempi a zero interni alle rep
        if (duration === 0 && (currentState === 'CONCENTRIC' || currentState === 'TOP_PAUSE' || currentState === 'ECCENTRIC' || currentState === 'BOTTOM_PAUSE')) {
            advanceStateLogic();
        }
    }

    function startNextSetDirectly() {
        const ex = routine[currentExIdx];
        currentLimb = (ex.type === 'unilateral') ? 'UNILATERAL_LEFT' : 'BILATERAL';
        actualReps = 0;
        goToPhase('CONCENTRIC', ex.conc);
    }

    function manualNextSet() {
        // Permette di saltare i tempi di recupero (Limb o Set Rest) se ci si sente pronti prima
        if(currentState === 'SET_REST' || currentState === 'LIMB_REST') {
            currentSecondsRemaining = 0;
            advanceStateLogic();
        }
    }

    function updatePlayerUI(phaseChanged) {
        const ex = routine[currentExIdx];
        if (!ex) return;

        document.getElementById('current-ex-name').innerText = ex.name;
        document.getElementById('current-set-hub').innerText = `SET ${currentSetIdx + 1}/${ex.sets}`;
        
        const targetString = ex.reps > 0 ? ` (Target: ${ex.reps})` : ' (Target: To Failure)';
        document.getElementById('status-reps').innerText = actualReps + targetString;
        document.getElementById('status-mode').innerText = ex.type === 'unilateral' ? 'Unilateral' : 'Single Set';
        
        let limbText = "Bilateral";
        if(currentLimb === 'UNILATERAL_LEFT') limbText = "Left Limb / 1st";
        if(currentLimb === 'UNILATERAL_RIGHT') limbText = "Right Limb / 2nd";
        document.getElementById('status-limb').innerText = limbText;

        const failureBtn = document.getElementById('failureBtn');
        const nextSetBtn = document.getElementById('nextSetBtn');
        const isAnActivePhase = (currentState === 'CONCENTRIC' || currentState === 'TOP_PAUSE' || currentState === 'ECCENTRIC' || currentState === 'BOTTOM_PAUSE');
        
        if(isRunning && isAnActivePhase) {
            failureBtn.classList.remove('hidden');
        } else {
            failureBtn.classList.add('hidden');
        }

        if(currentState === 'SET_REST' || currentState === 'LIMB_REST') {
            nextSetBtn.classList.remove('hidden');
        } else {
            nextSetBtn.classList.add('hidden');
        }

        const display = document.getElementById('timer-display');
        const title = document.getElementById('phase-title');
        const piston = document.getElementById('piston-weight');

        display.innerText = currentSecondsRemaining;

        let colorVar = '--color-idle';
        let startBottom = '0%';

        switch(currentState) {
            case 'COUNTDOWN': colorVar = '--color-countdown'; title.innerText = "Prepare"; startBottom = '0%'; break;
            case 'CONCENTRIC': colorVar = '--color-concentric'; title.innerText = "Ascent (Conc)"; startBottom = '0%'; break;
            case 'TOP_PAUSE': colorVar = '--color-pause'; title.innerText = "Iso High"; startBottom = '90%'; break;
            case 'ECCENTRIC': colorVar = '--color-eccentric'; title.innerText = "Descent (Ecc)"; startBottom = '90%'; break;
            case 'BOTTOM_PAUSE': colorVar = '--color-pause'; title.innerText = "Iso Low"; startBottom = '0%'; break;
            case 'LIMB_REST': colorVar = '--color-rest'; title.innerText = "Limb Switch"; startBottom = '0%'; break;
            case 'SET_REST': colorVar = '--color-rest'; title.innerText = "Set Rest"; startBottom = '0%'; break;
        }

        if (phaseChanged) {
            ring.style.transition = 'none';
            piston.style.transition = 'none';
            ring.style.stroke = `var(${colorVar})`;
            piston.style.background = `var(${colorVar})`;
            ring.style.strokeDashoffset = '0';
            piston.style.bottom = startBottom;
            
            void ring.offsetHeight; 
            void piston.offsetHeight;
        
            if (isRunning) {
                ring.style.transition = 'stroke-dashoffset 1s linear, stroke 0.3s ease';
                piston.style.transition = 'bottom 1s linear, background 0.3s ease';
            }
        } else {
            ring.style.stroke = `var(${colorVar})`;
            piston.style.background = `var(${colorVar})`;
        }

        let targetSeconds = isRunning ? (currentSecondsRemaining - 1) : currentSecondsRemaining;
        let targetPct = phaseTotalSeconds > 0 ? (targetSeconds / phaseTotalSeconds) : 0;
        ring.style.strokeDashoffset = ringCircumference * (1 - targetPct);

        let completedFactor = phaseTotalSeconds > 0 ? ((phaseTotalSeconds - targetSeconds) / phaseTotalSeconds) : 0;
        if (currentState === 'CONCENTRIC') {
            piston.style.bottom = (completedFactor * 90) + '%';
        } else if (currentState === 'TOP_PAUSE') {
            piston.style.bottom = '90%';
        } else if (currentState === 'ECCENTRIC') {
            piston.style.bottom = (90 - (completedFactor * 90)) + '%';
        } else {
            piston.style.bottom = '0%';
        }
    }

    window.onload = init;
</script>

</body>
</html>
